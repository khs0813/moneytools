<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <div th:replace="~{fragments/components :: pageHero('해외주식 세금 계산기', ${pageDescription})}"></div>
        <div th:replace="~{fragments/components :: calculationBasis(${activeMenu})}"></div>

        <section class="calculator-layout overseas-tax-layout" th:classappend="${result != null} ? ' has-result' : ''">
            <form class="calculator-form two-column-form" th:action="@{/overseas-stock-tax-calculator}" th:object="${form}" method="post">
                <h2>입력값</h2>
                <label>매수금액(외화)
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="buyAmountForeign" name="buyAmountForeign" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'buyAmountForeign')}">
                    <span class="field-error" th:if="${#fields.hasErrors('buyAmountForeign')}" th:errors="*{buyAmountForeign}"></span>
                </label>
                <label>매수일 환율
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="buyExchangeRate" name="buyExchangeRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'buyExchangeRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('buyExchangeRate')}" th:errors="*{buyExchangeRate}"></span>
                </label>
                <label>매도금액(외화)
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="sellAmountForeign" name="sellAmountForeign" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'sellAmountForeign')}">
                    <span class="field-error" th:if="${#fields.hasErrors('sellAmountForeign')}" th:errors="*{sellAmountForeign}"></span>
                </label>
                <label>매도일 환율
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="sellExchangeRate" name="sellExchangeRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'sellExchangeRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('sellExchangeRate')}" th:errors="*{sellExchangeRate}"></span>
                </label>
                <label>배당금(외화)
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="dividendForeign" name="dividendForeign" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'dividendForeign')}">
                    <span class="field-error" th:if="${#fields.hasErrors('dividendForeign')}" th:errors="*{dividendForeign}"></span>
                </label>
                <label>배당기준 환율
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="dividendExchangeRate" name="dividendExchangeRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'dividendExchangeRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('dividendExchangeRate')}" th:errors="*{dividendExchangeRate}"></span>
                </label>
                <label>매매 수수료 합계(원)
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="feeKrw" name="feeKrw" th:value="${@inputFieldValueFormatter.formatInteger(form, 'feeKrw')}">
                    <span class="field-error" th:if="${#fields.hasErrors('feeKrw')}" th:errors="*{feeKrw}"></span>
                </label>
                <label>기본공제(원)
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="basicDeductionKrw" name="basicDeductionKrw" th:value="${@inputFieldValueFormatter.formatInteger(form, 'basicDeductionKrw')}">
                    <span class="field-error" th:if="${#fields.hasErrors('basicDeductionKrw')}" th:errors="*{basicDeductionKrw}"></span>
                </label>
                <label>양도세율(% 기본 22)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="capitalGainsTaxRate" name="capitalGainsTaxRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'capitalGainsTaxRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('capitalGainsTaxRate')}" th:errors="*{capitalGainsTaxRate}"></span>
                </label>
                <label>배당세율(% 기본 15.4)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="dividendTaxRate" name="dividendTaxRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'dividendTaxRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('dividendTaxRate')}" th:errors="*{dividendTaxRate}"></span>
                </label>
                <label class="checkbox-row"><input type="checkbox" th:field="*{applyBasicDeduction}"> 기본공제 적용</label>
                <button class="primary-button" type="submit">계산하기</button>
            </form>
            <div th:if="${result == null}" th:replace="~{fragments/components :: resultEmptyState('값을 입력하면 결과가 표시됩니다. 예시 계산과 해석은 아래 본문에서 먼저 확인할 수 있습니다.')}"></div>
            <section class="result-panel" aria-live="polite" th:if="${result != null}" data-result-card>
                <h2>계산 결과</h2>
                <div class="result-grid">
                    <div><span>매수금액 원화환산</span><strong th:text="${#numbers.formatDecimal(result.buyAmountKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>매도금액 원화환산</span><strong th:text="${#numbers.formatDecimal(result.sellAmountKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>양도차익</span><strong th:text="${#numbers.formatDecimal(result.capitalGainKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>과세표준</span><strong th:text="${#numbers.formatDecimal(result.taxableCapitalGainKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>예상 양도세</span><strong th:text="${#numbers.formatDecimal(result.capitalGainsTaxKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>배당금 원화환산</span><strong th:text="${#numbers.formatDecimal(result.dividendKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>예상 배당세</span><strong th:text="${#numbers.formatDecimal(result.dividendTaxKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>총 예상 세금</span><strong th:text="${#numbers.formatDecimal(result.totalTaxKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>세후 수익</span><strong th:text="${#numbers.formatDecimal(result.afterTaxProfitKrw, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                </div>
                <button class="ghost-button" type="button" data-copy-result>결과 복사</button>
            </section>
            <div th:replace="~{fragments/components :: calculatorSideNote}"></div>
        </section>

        <div th:replace="~{fragments/components :: disclaimer('2026년 기준 해외 상장주식 양도차익은 기본공제 250만원을 차감한 과세표준에 기본적으로 22%(양도소득세 20% + 지방소득세 2%)를 적용하도록 기본값을 설정했습니다. 배당은 국내 원천징수 기준 15.4%를 기본값으로 두었지만, 연간 금융소득 2천만원 초과 또는 외국납부세액공제 반영 여부에 따라 실제 신고세액은 달라질 수 있습니다.')}" ></div>
        <div th:replace="~{fragments/longform :: calculatorContent(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: officialSources(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: faqList(${faqs})}"></div>
        <div th:replace="~{fragments/components :: relatedLinks(${activeMenu})}"></div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
