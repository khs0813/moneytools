<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<footer class="footer" th:fragment="footer">
    <div class="kakao-ad-banner" th:if="${adsAllowedOnPage}">
        <ins class="kakao_ad_area kakao-ad-banner__slot kakao-ad-banner__slot--desktop"
             style="display:none;"
             data-ad-unit="DAN-Hq6KgDgpxhxdwWwz"
             data-ad-width="728"
             data-ad-height="90"
             data-adfit-min-width="701"></ins>
        <ins class="kakao_ad_area kakao-ad-banner__slot kakao-ad-banner__slot--mobile"
             style="display:none;"
             data-ad-unit="DAN-5OUQxl2bPbnB5mxW"
             data-ad-width="320"
             data-ad-height="100"
             data-adfit-max-width="700"></ins>
    </div>
    <div>
        <strong th:text="${appName}">머니계산기</strong>
        <p>본 사이트의 계산 결과는 참고용이며 법률, 세무, 투자, 노무 자문을 대체하지 않습니다.</p>
    </div>
    <div class="footer-links">
        <a href="/about">사이트 소개</a>
        <a href="/guide">이용안내</a>
        <a href="/privacy-policy">개인정보처리방침</a>
        <a href="/terms">이용약관</a>
        <a href="/disclaimer">면책고지</a>
        <a href="/contact">문의하기</a>
        <a href="/sitemap.xml">사이트맵</a>
    </div>
    <p class="copyright">© <span th:text="${currentYear}">2026</span> <span th:text="${appName}">머니계산기</span>. All rights reserved.</p>
    <script th:if="${adsAllowedOnPage}" th:nonce="${cspNonce}">
        (function () {
            var adFitSrc = 'https://t1.kakaocdn.net/kas/static/ba.min.js';
            var viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;

            document.querySelectorAll('.kakao_ad_area[data-adfit-min-width], .kakao_ad_area[data-adfit-max-width]').forEach(function (adArea) {
                var minWidth = Number(adArea.dataset.adfitMinWidth || 0);
                var maxWidth = Number(adArea.dataset.adfitMaxWidth || 0);
                if ((minWidth && viewportWidth < minWidth) || (maxWidth && viewportWidth > maxWidth)) {
                    adArea.remove();
                }
            });

            if (!document.querySelector('.kakao_ad_area')) return;
            if (window.__moneytoolsAdFitLoaded || document.querySelector('script[src="' + adFitSrc + '"]')) return;
            window.__moneytoolsAdFitLoaded = true;

            var script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = adFitSrc;
            script.async = true;
            script.dataset.moneytoolsAdfit = 'true';

            var currentScript = document.currentScript;
            if (currentScript && currentScript.parentNode) {
                currentScript.parentNode.insertBefore(script, currentScript.nextSibling);
                return;
            }
            document.head.appendChild(script);
        })();
    </script>
    <script th:src="@{/js/calculator.js(v=${staticAssetVersion})}" defer></script>
</footer>
</body>
</html>
