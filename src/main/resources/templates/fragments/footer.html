<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<footer class="footer" th:fragment="footer">
    <div class="kakao-ad-banner" th:if="${adsAllowedOnPage}" style="display:block;width:100%;min-width:320px;min-height:90px;text-align:center;">
        <ins class="kakao_ad_area" style="display:none;"
             data-ad-unit="DAN-nC204VYE90MKQxGJ"
             data-ad-width="728"
             data-ad-height="90"></ins>
    </div>
    <div>
        <strong th:text="${appName}">머니계산기</strong>
        <p>본 사이트의 계산 결과는 참고용이며 법률, 세무, 투자, 노무 자문을 대체하지 않습니다.</p>
    </div>
    <div class="footer-links">
        <a href="/about">사이트 소개</a>
        <a href="/guide">이용안내</a>
        <a href="/privacy-policy">개인정보처리방침</a>
        <a href="/terms">이용약관</a>
        <a href="/disclaimer">면책고지</a>
        <a href="/contact">문의하기</a>
        <a href="/sitemap.xml">사이트맵</a>
    </div>
    <p class="copyright">© <span th:text="${currentYear}">2026</span> <span th:text="${appName}">머니계산기</span>. All rights reserved.</p>
    <script th:if="${adsAllowedOnPage}" th:nonce="${cspNonce}">
        (function () {
            var adUnit = 'DAN-nC204VYE90MKQxGJ';
            var sdkSrc = '//t1.kakaocdn.net/kas/static/ba.min.js';
            var maxAttempts = 20;
            var attempt = 0;

            function loadAdFitWhenReady() {
                var adArea = document.querySelector('[data-ad-unit="' + adUnit + '"]');
                var adWrapper = adArea ? adArea.closest('.kakao-ad-banner') : null;
                var width = adWrapper ? adWrapper.getBoundingClientRect().width : 0;

                if (width > 0) {
                    if (document.querySelector('script[src="' + sdkSrc + '"], script[src="https://t1.kakaocdn.net/kas/static/ba.min.js"]')) {
                        return;
                    }
                    var script = document.createElement('script');
                    script.type = 'text/javascript';
                    script.src = sdkSrc;
                    script.async = true;
                    document.body.appendChild(script);
                    return;
                }

                attempt += 1;
                if (attempt < maxAttempts) {
                    window.requestAnimationFrame(loadAdFitWhenReady);
                }
            }

            window.requestAnimationFrame(loadAdFitWhenReady);
        })();
    </script>
    <script th:src="@{/js/calculator.js(v=${staticAssetVersion})}" defer></script>
</footer>
</body>
</html>
