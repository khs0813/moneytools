<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle, pageDescription, canonicalUrl)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <meta name="theme-color" content="#f7f6ff">
    <meta name="format-detection" content="telephone=no, address=no, email=no">
    <meta name="application-name" th:content="${appName}">
    <title th:text="${pageTitle}">머니계산기</title>
    <meta name="description" lang="ko" th:content="${pageDescription}">
    <link rel="canonical" th:href="${canonicalUrl}">
    <link rel="alternate" hreflang="ko-KR" th:href="${canonicalUrl}">
    <link rel="alternate" hreflang="ko" th:href="${canonicalUrl}">
    <link rel="alternate" hreflang="x-default" th:href="${canonicalUrl}">
    <link rel="alternate" type="application/rss+xml" title="머니계산기 RSS" th:href="${baseUrl + '/rss.xml'}">

    <meta property="og:locale" content="ko_KR">
    <meta property="og:type" content="website">
    <meta property="og:site_name" th:content="${appName}">
    <meta property="og:title" th:content="${pageTitle}">
    <meta property="og:description" th:content="${pageDescription}">
    <meta property="og:url" th:content="${canonicalUrl}">
    <meta property="og:image" th:content="${defaultImageUrl}">
    <meta property="og:image:type" content="image/svg+xml">
    <meta property="og:image:alt" content="머니계산기 대표 이미지">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${pageTitle}">
    <meta name="twitter:description" th:content="${pageDescription}">
    <meta name="twitter:image" th:content="${defaultImageUrl}">
    <meta name="twitter:image:alt" content="머니계산기 대표 이미지">

    <meta th:if="${googleSiteVerification != null and !#strings.isEmpty(googleSiteVerification)}" name="google-site-verification" th:content="${googleSiteVerification}">
    <meta th:if="${naverSiteVerification != null and !#strings.isEmpty(naverSiteVerification)}" name="naver-site-verification" th:content="${naverSiteVerification}">
    <meta name="google-adsense-account" content="ca-pub-7766989656523085">

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" th:href="@{/css/styles.css(v=${staticAssetVersion})}">

    <script th:if="${adsenseEnabled}" async crossorigin="anonymous"
            th:src="'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + ${adsenseClient}"></script>
    <script type="application/ld+json" th:if="${structuredData != null}" th:utext="${structuredData}"></script>
</head>
</html>
