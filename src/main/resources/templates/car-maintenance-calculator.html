<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <div th:replace="~{fragments/components :: pageHero('자동차 유지비 계산기', ${pageDescription})}"></div>

        <section class="calculator-layout" th:classappend="${result != null} ? ' has-result' : ''">
            <form class="calculator-form two-column-form" th:action="@{/car-maintenance-calculator}" th:object="${form}" method="post">
                <h2>입력값</h2>
                <label>월 주행거리(km)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="monthlyDistanceKm" name="monthlyDistanceKm" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'monthlyDistanceKm')}">
                    <span class="field-error" th:if="${#fields.hasErrors('monthlyDistanceKm')}" th:errors="*{monthlyDistanceKm}"></span>
                </label>
                <label>연비(km/L)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="fuelEfficiencyKmPerLiter" name="fuelEfficiencyKmPerLiter" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'fuelEfficiencyKmPerLiter')}">
                    <span class="field-error" th:if="${#fields.hasErrors('fuelEfficiencyKmPerLiter')}" th:errors="*{fuelEfficiencyKmPerLiter}"></span>
                </label>
                <label>리터당 유가(원)
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="fuelPricePerLiter" name="fuelPricePerLiter" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'fuelPricePerLiter')}">
                    <span class="field-error" th:if="${#fields.hasErrors('fuelPricePerLiter')}" th:errors="*{fuelPricePerLiter}"></span>
                </label>
                <label>월 주차비
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="parkingFeeMonthly" name="parkingFeeMonthly" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'parkingFeeMonthly')}">
                    <span class="field-error" th:if="${#fields.hasErrors('parkingFeeMonthly')}" th:errors="*{parkingFeeMonthly}"></span>
                </label>
                <label>연 보험료
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="insuranceAnnual" name="insuranceAnnual" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'insuranceAnnual')}">
                    <span class="field-error" th:if="${#fields.hasErrors('insuranceAnnual')}" th:errors="*{insuranceAnnual}"></span>
                </label>
                <label>연 자동차세
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="taxAnnual" name="taxAnnual" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'taxAnnual')}">
                    <span class="field-error" th:if="${#fields.hasErrors('taxAnnual')}" th:errors="*{taxAnnual}"></span>
                </label>
                <label>연 정비비
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="maintenanceAnnual" name="maintenanceAnnual" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'maintenanceAnnual')}">
                    <span class="field-error" th:if="${#fields.hasErrors('maintenanceAnnual')}" th:errors="*{maintenanceAnnual}"></span>
                </label>
                <label>월 통행료
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="tollMonthly" name="tollMonthly" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'tollMonthly')}">
                    <span class="field-error" th:if="${#fields.hasErrors('tollMonthly')}" th:errors="*{tollMonthly}"></span>
                </label>
                <label>월 할부금
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="installmentMonthly" name="installmentMonthly" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'installmentMonthly')}">
                    <span class="field-error" th:if="${#fields.hasErrors('installmentMonthly')}" th:errors="*{installmentMonthly}"></span>
                </label>
                <button class="primary-button" type="submit">계산하기</button>
            </form>
            <div th:if="${result == null}" th:replace="~{fragments/components :: resultEmptyState('값을 입력하면 결과가 표시됩니다. 예시 계산과 해석은 아래 본문에서 먼저 확인할 수 있습니다.')}"></div>
            <section class="result-panel" aria-live="polite" th:if="${result != null}" data-result-card>
                <h2>계산 결과</h2>
                <div class="result-grid">
                    <div><span>월 유류비</span><strong th:text="${#numbers.formatDecimal(result.fuelCostMonthly, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>월 고정비</span><strong th:text="${#numbers.formatDecimal(result.fixedCostMonthly, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>월 변동비</span><strong th:text="${#numbers.formatDecimal(result.variableCostMonthly, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>월 총 유지비</span><strong th:text="${#numbers.formatDecimal(result.totalCostMonthly, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>연 총 유지비</span><strong th:text="${#numbers.formatDecimal(result.totalCostAnnual, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>km당 비용</span><strong th:text="${#numbers.formatDecimal(result.costPerKm, 0, 'COMMA', 0, 'POINT')} + '원/km'">0원/km</strong></div>
                </div>
                <button class="ghost-button" type="button" data-copy-result>결과 복사</button>
            </section>
            <div th:replace="~{fragments/components :: calculatorSideNote}"></div>
        </section>

        <div th:replace="~{fragments/components :: disclaimer('현금 유출 중심의 월평균 유지비 계산입니다. 감가상각, 사고 위험, 예기치 못한 수리비는 충분히 반영되지 않으므로 차량 보유 결정 전에는 실제 지출 기록을 함께 보시기 바랍니다.')}"></div>
        <div th:replace="~{fragments/longform :: calculatorContent(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: officialSources(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: faqList(${faqs})}"></div>
        <div th:replace="~{fragments/components :: relatedLinks(${activeMenu})}"></div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
