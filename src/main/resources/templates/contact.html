<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <div th:replace="~{fragments/components :: pageHero('문의하기', ${pageDescription})}"></div>
        <section class="content-card">
            <h2>오류 제보와 제휴 문의</h2>
            <p>계산 기준 오류, 기능 제안, 광고·제휴 문의는 아래 이메일로 보내주세요.</p>
            <a class="primary-button" th:href="'mailto:' + ${contactEmail}" th:text="${contactEmail}">contact@moneycalculator.co.kr</a>
            <div class="notice-box">
                <strong>권장 문의 양식</strong>
                <p>계산기 이름, 입력값, 예상 결과, 실제 결과를 함께 보내주시면 더 빠르게 확인할 수 있습니다.</p>
            </div>
        </section>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
