<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <div th:replace="~{fragments/components :: pageHero('에어컨 전기세 계산기', ${pageDescription})}"></div>
        <div th:replace="~{fragments/components :: calculationBasis(${activeMenu})}"></div>

        <section class="calculator-layout" th:classappend="${result != null} ? ' has-result' : ''">
            <form class="calculator-form" th:action="@{/air-conditioner-electricity-calculator}" th:object="${form}" method="post">
                <h2>입력값</h2>
                <label>소비전력(W)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="powerWatts" name="powerWatts" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'powerWatts')}">
                    <span class="field-error" th:if="${#fields.hasErrors('powerWatts')}" th:errors="*{powerWatts}"></span>
                </label>
                <label>하루 사용 시간
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="hoursPerDay" name="hoursPerDay" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'hoursPerDay')}">
                    <span class="field-error" th:if="${#fields.hasErrors('hoursPerDay')}" th:errors="*{hoursPerDay}"></span>
                </label>
                <label>월 사용 일수
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="daysPerMonth" name="daysPerMonth" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'daysPerMonth')}">
                    <span class="field-error" th:if="${#fields.hasErrors('daysPerMonth')}" th:errors="*{daysPerMonth}"></span>
                </label>
                <label>kWh당 단가(원)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="electricityRatePerKwh" name="electricityRatePerKwh" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'electricityRatePerKwh')}">
                    <span class="field-error" th:if="${#fields.hasErrors('electricityRatePerKwh')}" th:errors="*{electricityRatePerKwh}"></span>
                </label>
                <label>대기전력(W)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="standbyWatts" name="standbyWatts" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'standbyWatts')}">
                    <span class="field-error" th:if="${#fields.hasErrors('standbyWatts')}" th:errors="*{standbyWatts}"></span>
                </label>
                <button class="primary-button" type="submit">계산하기</button>
            </form>
            <div th:if="${result == null}" th:replace="~{fragments/components :: resultEmptyState('값을 입력하면 결과가 표시됩니다. 예시 계산과 해석은 아래 본문에서 먼저 확인할 수 있습니다.')}"></div>
            <section class="result-panel" aria-live="polite" th:if="${result != null}" data-result-card>
                <h2>계산 결과</h2>
                <div class="result-grid">
                    <div><span>냉방 사용 전력량</span><strong th:text="${#numbers.formatDecimal(result.activeUsageKwh, 0, 'COMMA', 1, 'POINT')} + 'kWh'">0kWh</strong></div>
                    <div><span>대기전력 사용량</span><strong th:text="${#numbers.formatDecimal(result.standbyUsageKwh, 0, 'COMMA', 1, 'POINT')} + 'kWh'">0kWh</strong></div>
                    <div><span>월 총 사용 전력량</span><strong th:text="${#numbers.formatDecimal(result.totalUsageKwh, 0, 'COMMA', 1, 'POINT')} + 'kWh'">0kWh</strong></div>
                    <div><span>예상 월 전기요금</span><strong th:text="${#numbers.formatDecimal(result.estimatedCost, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>하루 평균 비용</span><strong th:text="${#numbers.formatDecimal(result.dailyCost, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>시간당 평균 비용</span><strong th:text="${#numbers.formatDecimal(result.hourlyCost, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                </div>
                <button class="ghost-button" type="button" data-copy-result>결과 복사</button>
            </section>
            <div th:replace="~{fragments/components :: calculatorSideNote}"></div>
        </section>

        <div th:replace="~{fragments/components :: disclaimer('정격 소비전력 기준의 참고 계산입니다. 인버터 동작, 실내외 온도, 단열 상태, 누진구간 진입 여부에 따라 실제 청구 전기요금은 달라질 수 있습니다.')}"></div>
        <div th:replace="~{fragments/longform :: calculatorContent(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: officialSources(${activeMenu})}"></div>
        <div th:replace="~{fragments/components :: faqList(${faqs})}"></div>
        <div th:replace="~{fragments/components :: relatedLinks(${activeMenu})}"></div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
