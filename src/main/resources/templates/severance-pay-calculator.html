<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <section class="page-hero page-hero-compact">
            <p class="eyebrow">Finance Calculator</p>
            <h1>퇴직금 계산기</h1>
            <p th:text="${pageDescription}">설명</p>
        </section>
        <div th:replace="~{fragments/ads :: ad(${adSlotTop}, '상단 광고')}"></div>

        <section class="calculator-layout">
            <form class="calculator-form" th:action="@{/severance-pay-calculator}" th:object="${form}" method="post">
                <h2>입력값</h2>
                <label>입사일
                    <input type="date" th:field="*{startDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
                </label>
                <label>퇴사일
                    <input type="date" th:field="*{endDate}">
                    <span class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>
                    <span class="field-error" th:if="${dateError != null}" th:text="${dateError}"></span>
                </label>
                <label>퇴직 전 3개월 임금 총액
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="totalWageForLastThreeMonths" name="totalWageForLastThreeMonths" th:value="${@inputFieldValueFormatter.formatInteger(form, 'totalWageForLastThreeMonths')}">
                    <span class="field-error" th:if="${#fields.hasErrors('totalWageForLastThreeMonths')}" th:errors="*{totalWageForLastThreeMonths}"></span>
                </label>
                <label>연간 상여금 총액
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="annualBonus" name="annualBonus" th:value="${@inputFieldValueFormatter.formatInteger(form, 'annualBonus')}">
                    <span class="field-error" th:if="${#fields.hasErrors('annualBonus')}" th:errors="*{annualBonus}"></span>
                </label>
                <label>연차휴가 미사용수당(직전 1년 발생분)
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="annualLeaveAllowance" name="annualLeaveAllowance" th:value="${@inputFieldValueFormatter.formatInteger(form, 'annualLeaveAllowance')}">
                    <span class="field-error" th:if="${#fields.hasErrors('annualLeaveAllowance')}" th:errors="*{annualLeaveAllowance}"></span>
                </label>
                <label>1일 통상임금(선택 입력)
                    <input type="text" inputmode="numeric" autocomplete="off" data-money-input data-number-input="integer" id="ordinaryDailyWage" name="ordinaryDailyWage" th:value="${@inputFieldValueFormatter.formatInteger(form, 'ordinaryDailyWage')}">
                    <span class="field-error" th:if="${#fields.hasErrors('ordinaryDailyWage')}" th:errors="*{ordinaryDailyWage}"></span>
                </label>
                <button class="primary-button" type="submit">계산하기</button>
            </form>

            <div th:if="${result == null}" th:replace="~{fragments/components :: calculatorSideNote}"></div>
            <section class="result-panel" th:if="${result != null}" data-result-card>
                <h2>계산 결과</h2>
                <div class="result-grid">
                    <div><span>재직일수</span><strong th:text="${#numbers.formatInteger(result.serviceDays, 0, 'COMMA')} + '일'">0일</strong></div>
                    <div><span>직전 3개월 일수</span><strong th:text="${#numbers.formatInteger(result.calculationPeriodDays, 0, 'COMMA')} + '일'">0일</strong></div>
                    <div><span>1일 평균임금</span><strong th:text="${#numbers.formatDecimal(result.averageDailyWage, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>1일 통상임금</span><strong th:text="${#numbers.formatDecimal(result.ordinaryDailyWage, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>적용 1일 임금</span><strong th:text="${#numbers.formatDecimal(result.appliedDailyWage, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                    <div><span>예상 퇴직금</span><strong th:text="${#numbers.formatDecimal(result.estimatedSeverancePay, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong></div>
                </div>
                <button class="ghost-button" type="button" data-copy-result>결과 복사</button>
            </section>
        </section>

        <div th:replace="~{fragments/components :: disclaimer('퇴직금은 근로기준법상 직전 3개월 평균임금을 기본으로 하되, 그 평균임금이 통상임금보다 낮으면 통상임금을 적용합니다. 이 페이지는 2026년 기준 법령 구조를 반영해 실제 3개월 일수와 통상임금 하한을 함께 고려합니다.')}" ></div>
        <section class="content-card">
            <h2>계산식</h2>
            <p>1일 평균임금은 퇴직일 이전 3개월 동안 지급된 임금 총액에 연간 상여금의 3/12, 직전 1년 발생 연차수당의 3/12를 더한 뒤 같은 기간의 실제 총일수로 나누어 계산합니다. 계산된 평균임금이 1일 통상임금보다 낮으면 통상임금을 적용하고, 예상 퇴직금은 적용 1일 임금 × 30일 × 재직일수 ÷ 365로 계산합니다.</p>
        </section>
        <div th:replace="~{fragments/ads :: ad(${adSlotResult}, '결과 하단 광고')}"></div>
        <div th:replace="~{fragments/components :: faqList(${faqs})}"></div>
        <div th:replace="~{fragments/components :: relatedLinks(${activeMenu})}"></div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
