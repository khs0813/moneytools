<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${pageDescription}, ${canonicalUrl})}"></head>
<body>
<button class="mobile-menu-button" type="button" data-menu-toggle aria-label="메뉴 열기">☰</button>
<div class="app-shell">
    <aside th:replace="~{fragments/nav :: sidebar(${activeMenu})}"></aside>
    <main class="main-content">
        <div th:replace="~{fragments/components :: breadcrumbs(${page})}"></div>
        <div th:replace="~{fragments/components :: pageHero('환율 계산기', ${pageDescription})}"></div>
        <div th:replace="~{fragments/ads :: ad(${adSlotTop}, '상단 광고')}"></div>

        <section class="calculator-layout" th:classappend="${result != null} ? ' has-result' : ''">
            <form class="calculator-form" th:action="@{/exchange-calculator}" th:object="${form}" method="post">
                <h2>입력값</h2>
                <label>금액
                    <input type="text" inputmode="decimal" autocomplete="off" data-money-input data-number-input="decimal" id="amount" name="amount" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'amount')}">
                    <span class="field-error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></span>
                </label>
                <label>보내는 통화
                    <select th:field="*{fromCurrency}">
                        <option value="USD">USD</option><option value="KRW">KRW</option><option value="JPY">JPY</option><option value="EUR">EUR</option><option value="CNY">CNY</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('fromCurrency')}" th:errors="*{fromCurrency}"></span>
                </label>
                <label>받는 통화
                    <select th:field="*{toCurrency}">
                        <option value="KRW">KRW</option><option value="USD">USD</option><option value="JPY">JPY</option><option value="EUR">EUR</option><option value="CNY">CNY</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('toCurrency')}" th:errors="*{toCurrency}"></span>
                </label>
                <label>환율
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="exchangeRate" name="exchangeRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'exchangeRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('exchangeRate')}" th:errors="*{exchangeRate}"></span>
                </label>
                <label>수수료율(%)
                    <input type="text" inputmode="decimal" autocomplete="off" data-number-input="decimal" id="feeRate" name="feeRate" th:value="${@inputFieldValueFormatter.formatDecimal(form, 'feeRate')}">
                    <span class="field-error" th:if="${#fields.hasErrors('feeRate')}" th:errors="*{feeRate}"></span>
                </label>
                <button class="primary-button" type="submit">계산하기</button>
            </form>
            <section class="result-panel" aria-live="polite" th:if="${result != null}" data-result-card>
                <h2>계산 결과</h2>
                <div class="result-grid">
                    <div><span>수수료 전 금액</span><strong th:text="${#numbers.formatDecimal(result.beforeFeeAmount, 0, 'COMMA', 2, 'POINT')} + ' ' + ${form.toCurrency}">0</strong></div>
                    <div><span>예상 수수료</span><strong th:text="${#numbers.formatDecimal(result.feeAmount, 0, 'COMMA', 2, 'POINT')} + ' ' + ${form.toCurrency}">0</strong></div>
                    <div><span>수수료 후 금액</span><strong th:text="${#numbers.formatDecimal(result.afterFeeAmount, 0, 'COMMA', 2, 'POINT')} + ' ' + ${form.toCurrency}">0</strong></div>
                </div>
                <button class="ghost-button" type="button" data-copy-result>결과 복사</button>
            </section>
            <div th:replace="~{fragments/components :: calculatorSideNote}"></div>
        </section>

        <div th:replace="~{fragments/components :: seoContent(${activeMenu})}"></div>
        <div th:replace="~{fragments/ads :: ad(${adSlotResult}, '결과 하단 광고')}"></div>
        <div th:replace="~{fragments/components :: faqList(${faqs})}"></div>
        <div th:replace="~{fragments/components :: relatedLinks(${activeMenu})}"></div>
        <footer th:replace="~{fragments/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>
