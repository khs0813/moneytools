server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml,image/png

spring:
  application:
    name: moneytools
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  web:
    resources:
      cache:
        period: 365d

app:
  name: ${APP_NAME:머니계산기}
  # 운영 도메인을 설정하면 canonical, sitemap, OG URL이 고정됩니다.
  # 비워두면 요청 호스트를 기준으로 절대 URL을 생성합니다.
  base-url: ${APP_BASE_URL:https://www.moneycalculator.co.kr}
  description: ${APP_DESCRIPTION:대출이자, 실수령액, 퇴직금, 해외주식 세금, 배당 등 자주 찾는 금융 계산기 모음}
  contact-email: ${APP_CONTACT_EMAIL:moneyfinancecalculator@gmail.com}
  google-site-verification: ${GOOGLE_SITE_VERIFICATION:}
  naver-site-verification: ${NAVER_SITE_VERIFICATION:}
