server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: moneytools
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  web:
    resources:
      cache:
        period: 365d
  # Example only. The current app does not require a database by default.
  # datasource:
  #   url: ${DB_URL:jdbc:mysql://localhost:3306/moneytools}
  #   username: ${DB_USERNAME:moneytools_user}
  #   password: ${DB_PASSWORD:change-me}

app:
  name: ${APP_NAME:머니계산기}
  base-url: ${APP_BASE_URL:https://www.moneycalculator.co.kr}
  description: ${APP_DESCRIPTION:대출이자, 실수령액, 퇴직금, 해외주식 세금, 배당 등 자주 찾는 금융 계산기 모음}
  contact-email: ${APP_CONTACT_EMAIL:moneyfinancecalculator@gmail.com}
  google-site-verification: ${GOOGLE_SITE_VERIFICATION:}
  naver-site-verification: ${NAVER_SITE_VERIFICATION:}
